<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color:#1a3a5c; background: linear-gradient(135deg, #f3f6fa 0%, #e8eef5 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .unlock-card { width: 100%; max-width: 380px; background: white; border-radius: 12px; box-shadow: 0 6px 30px rgba(20, 40, 80, 0.15); padding: 36px 30px; text-align:center; }
  .unlock-title { font-size: 1.35em; font-weight: 600; margin: 0 0 6px 0; color:#1a3a5c; letter-spacing: -0.01em; }
  .unlock-sub { font-size: 0.92em; color:#4b5563; margin: 0 0 24px 0; }
  .unlock-form { display:flex; flex-direction:column; gap:12px; }
  .unlock-input { width:100%; padding: 12px 14px; font-size: 1em; border:1px solid #c8d4e0; border-radius:8px; outline:none; transition: border-color 0.15s, box-shadow 0.15s; }
  .unlock-input:focus { border-color:#1a3a5c; box-shadow: 0 0 0 3px rgba(26, 58, 92, 0.12); }
  .unlock-btn { width:100%; padding: 12px 14px; font-size: 1em; font-weight:600; color:white; background: linear-gradient(135deg, #1a3a5c 0%, #0d9488 100%); border:none; border-radius:8px; cursor:pointer; transition: opacity 0.15s; }
  .unlock-btn:hover { opacity: 0.92; }
  .unlock-btn:disabled { opacity: 0.55; cursor: wait; }
  .unlock-err { color:#b91c1c; font-size:0.88em; margin-top:8px; min-height:1.2em; }
  .unlock-foot { margin-top: 22px; font-size: 0.75em; color:#9ca3af; }
</style>
</head>

  var SESSION_KEY = "phmUnlockPw";
  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  async function deriveKey(password) {
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64ToBytes(META.saltB64), iterations: META.iter, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }
  async function tryUnlock(password, silent) {
    var btn = document.getElementById("unlockBtn");
    var err = document.getElementById("unlockErr");
    if (btn && !silent) { btn.disabled = true; btn.textContent = "Unlocking…"; }
    if (err) err.textContent = "";
    try {
      var key = await deriveKey(password);
      var plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64ToBytes(META.ivB64) },
        key,
        b64ToBytes(META.ctB64)
      );
      var html = new TextDecoder().decode(plain);
      try { sessionStorage.setItem(SESSION_KEY, password); } catch(e) {}
      document.open();
      document.write(html);
      document.close();
      return true;
    } catch (e) {
      try { sessionStorage.removeItem(SESSION_KEY); } catch(_) {}
      if (!silent) {
        if (btn) { btn.disabled = false; btn.textContent = "Unlock"; }
        if (err) err.textContent = "Wrong password. Try again.";
        var pwEl = document.getElementById("unlockPw");
        if (pwEl) { pwEl.value = ""; pwEl.focus(); }
      }
      return false;
    }

  // Silent path: any decrypt error just falls back to showing the form normally.
  try {
    var cached = sessionStorage.getItem(SESSION_KEY);
    if (cached) { tryUnlock(cached, true); }
  } catch(e) {}
  // Form submit / Enter key
  document.getElementById("unlockForm").addEventListener("submit", function(ev){
    ev.preventDefault();
    var pw = document.getElementById("unlockPw").value;
    if (!pw) return;
    tryUnlock(pw, false);
  });
